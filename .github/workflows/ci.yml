name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        # Build first: the vite build generates src/routeTree.gen.ts
        # (gitignored), which typecheck and lint need to resolve router
        # types. Running tsc before it fails on a fresh checkout.
        run: pnpm exec vite build
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test

  rust:
    strategy:
      fail-fast: false
      matrix:
        # macos catches cfg(target_os = "macos") regressions (Keychain
        # secure_store, tray/Reopen); ubuntu covers the cfg(not(...)) side.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: cargo test
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml
